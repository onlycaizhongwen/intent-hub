services:
  intent-hub-model-service:
    build:
      context: .
    image: intent-hub/model-service-fastapi:local
    environment:
      MODEL_SERVICE_AUTH_TOKEN: ${MODEL_SERVICE_AUTH_TOKEN:-}
      MODEL_SERVICE_AUTH_TOKEN_FILE: ${MODEL_SERVICE_AUTH_TOKEN_FILE:-}
    volumes:
      - ${MODEL_SERVICE_SECRET_DIR:-./.secrets}:/run/secrets/intent-hub-model:ro
    ports:
      - "18081:18081"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18081/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
