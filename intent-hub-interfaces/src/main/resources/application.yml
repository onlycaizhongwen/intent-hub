spring:
  application:
    name: intent-hub
  flyway:
    enabled: false

server:
  port: 8080

intent-hub:
  persistence:
    mode: memory
  model-service:
    enabled: false
    base-url: ""
    timeout-ms: 2000
  llm:
    enabled: false
    base-url: ""
    timeout-ms: 3000
    max-retries: 0
    daily-budget: 0.0
    min-confidence: 0.70

---
spring:
  config:
    activate:
      on-profile: local-jdbc
  datasource:
    url: jdbc:postgresql://localhost:5432/intent_hub
    username: intent_hub
    password: intent_hub
  flyway:
    enabled: true
    locations: classpath:db/migration

intent-hub:
  persistence:
    mode: jdbc

---
spring:
  config:
    activate:
      on-profile: dashscope-smoke
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        enabled: true
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}

intent-hub:
  llm:
    enabled: true
    base-url: "spring-ai-alibaba"
    timeout-ms: 5000
    max-retries: 0
    daily-budget: 3.0
    min-confidence: 0.60
