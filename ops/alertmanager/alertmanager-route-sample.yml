route:
  receiver: intent-hub-platform
  group_by:
    - alertname
    - subsystem
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - subsystem="intent-hub"
        - severity="critical"
      receiver: intent-hub-p1
      group_wait: 10s
      repeat_interval: 30m
    - matchers:
        - subsystem="intent-hub"
        - category="security"
      receiver: intent-hub-security
      group_wait: 10s
      repeat_interval: 1h
    - matchers:
        - subsystem="intent-hub"
        - severity="warning"
      receiver: intent-hub-p2
      repeat_interval: 2h

receivers:
  - name: intent-hub-platform
    webhook_configs:
      - url: http://alert-router.example.internal/intent-hub/platform
        send_resolved: true
  - name: intent-hub-p1
    webhook_configs:
      - url: http://alert-router.example.internal/intent-hub/p1
        send_resolved: true
  - name: intent-hub-security
    webhook_configs:
      - url: http://alert-router.example.internal/intent-hub/security
        send_resolved: true
  - name: intent-hub-p2
    webhook_configs:
      - url: http://alert-router.example.internal/intent-hub/p2
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - subsystem="intent-hub"
      - severity="critical"
    target_matchers:
      - subsystem="intent-hub"
      - severity="warning"
    equal:
      - alertname
