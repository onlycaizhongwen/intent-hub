global:
  scrape_interval: 30s
  scrape_timeout: 5s

rule_files:
  - /etc/prometheus/rules/intent-hub-alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: intent-hub
    metrics_path: /api/v1/admin/metrics/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          service: intent-hub
          environment: local
