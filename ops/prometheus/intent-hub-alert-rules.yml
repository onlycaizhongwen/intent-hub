groups:
  - name: intent-hub-p2x-alerts
    rules:
      - alert: IntentHubBadCaseRateHigh
        expr: intent_hub_bad_cases_total / clamp_min(intent_hub_requests_total, 1) > 0.30
        for: 5m
        labels:
          severity: warning
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub bad case rate is high"
          description: "Bad case rate is above 30% for 5 minutes. Check rejected requests, low-confidence intents, and recent config changes."

      - alert: IntentHubModelFallbackDetected
        expr: intent_hub_model_fallbacks_total > 0
        for: 5m
        labels:
          severity: warning
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub model fallback detected"
          description: "Model fallback has occurred. Check model-service health, timeout, and base-url configuration."

      - alert: IntentHubLlmFallbackDetected
        expr: intent_hub_llm_fallbacks_total > 0
        for: 5m
        labels:
          severity: warning
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub LLM fallback detected"
          description: "LLM fallback has occurred. Confirm that LLM is still acting as the last-resort path and review fallback decisions."

      - alert: IntentHubLlmBudgetReconciliationDetected
        expr: intent_hub_llm_budget_reconciliations_total > 0
        for: 5m
        labels:
          severity: warning
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub LLM budget reconciliation detected"
          description: "Stale LLM budget reservations were reconciled. Check provider timeouts, pending budget usage, and adapter failures."

      - alert: IntentHubConfigPermissionDenied
        expr: increase(intent_hub_permission_denied_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          subsystem: intent-hub
          category: security
        annotations:
          summary: "Intent Hub config permission denied"
          description: "Config permission denial increased in the last 5 minutes. Check CONFIG_PERMISSION_DENIED audit events, actor roles, tenant/scene scoped permissions, and recent Admin operations."

      - alert: IntentHubAdminJwtAuthFailed
        expr: increase(intent_hub_admin_jwt_auth_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          subsystem: intent-hub
          category: security
        annotations:
          summary: "Intent Hub Admin JWT authentication failed"
          description: "Admin JWT authentication failures increased in the last 5 minutes. Check ADMIN_JWT_AUTH_FAILED audit events, token issuer/audience/expiration, secretRef resolution, and gateway authentication configuration."

      - alert: IntentHubAdminJwksFetchFailed
        expr: increase(intent_hub_admin_jwks_fetch_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          subsystem: intent-hub
          category: security
        annotations:
          summary: "Intent Hub Admin JWKS fetch failed"
          description: "Admin JWKS fetch failures increased in the last 5 minutes. Check IAM/OIDC JWKS endpoint health, DNS/TLS/proxy, jwksFetchTimeoutMs, and whether stale JWKS fallback is being used."

      - alert: IntentHubAdminJwksStaleHit
        expr: increase(intent_hub_admin_jwks_stale_hits_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          subsystem: intent-hub
          category: security
        annotations:
          summary: "Intent Hub Admin JWKS stale cache used"
          description: "Admin JWKS stale cache was used after refresh failures in the last 5 minutes. Confirm IAM/OIDC JWKS endpoint recovery before the stale grace window expires."

      - alert: IntentHubAdminOidcDiscoveryFetchFailed
        expr: increase(intent_hub_admin_oidc_discovery_fetch_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          subsystem: intent-hub
          category: security
        annotations:
          summary: "Intent Hub Admin OIDC discovery fetch failed"
          description: "Admin OIDC discovery fetch failures increased in the last 5 minutes. Check discovery endpoint health, issuer metadata, jwks_uri availability, DNS/TLS/proxy, and oidcDiscoveryIssuerValidationEnabled settings."

      - alert: IntentHubAverageLatencyHigh
        expr: intent_hub_latency_millis_avg > 1000
        for: 5m
        labels:
          severity: warning
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub average latency is high"
          description: "Average recognition latency is above 1000 ms for 5 minutes. Check routing strategy, model service, LLM fallback, and database latency."

      - alert: IntentHubP95LatencyHigh
        expr: intent_hub_latency_millis_p95 > 1500
        for: 5m
        labels:
          severity: warning
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub P95 latency is high"
          description: "P95 recognition latency is above 1500 ms for 5 minutes. Check slow scenes, model service, LLM fallback, and database latency."

      - alert: IntentHubP99LatencyCritical
        expr: intent_hub_latency_millis_p99 > 3000
        for: 2m
        labels:
          severity: critical
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub P99 latency is critical"
          description: "P99 recognition latency is above 3000 ms. Check slow external dependencies and timeout settings immediately."

      - alert: IntentHubMaxLatencyCritical
        expr: intent_hub_latency_millis_max > 3000
        for: 2m
        labels:
          severity: critical
          subsystem: intent-hub
        annotations:
          summary: "Intent Hub max latency is critical"
          description: "Max recognition latency is above 3000 ms. Check slow downstream dependencies and timeout settings immediately."
